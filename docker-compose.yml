services:
  app:
    build: .
    command: npm run dev
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"  
    volumes:
      - .:/app
      - /app/node_modules

  worker:
    build: .
    command: npm run worker
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
      - /app/node_modules

  postgres:
    image: postgres:17
    container_name: ticketing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketing"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticketing-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  postgres_data: