services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: node dist/index.js
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: node dist/worker.js
    env_file:
      - .env.production
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketing
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  postgres_data: